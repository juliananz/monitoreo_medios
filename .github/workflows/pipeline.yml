name: Pipeline Diario

on:
  schedule:
    - cron: "0 12 * * *"   # 12:00 UTC = 06:00 CST (hora Coahuila)
  workflow_dispatch:         # también se puede correr manualmente desde GitHub

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install torch CPU
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore SQLite DB from cache
        id: cache-db
        uses: actions/cache@v4
        with:
          path: data/noticias_medios.db
          key: noticias-db-${{ github.run_id }}
          restore-keys: |
            noticias-db-

      - name: Run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DB_PATH: data/noticias_medios.db
          OUTPUT_DIR: data/salidas
        run: python main.py

      - name: Commit salidas para Streamlit Cloud
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Force-add the two files Streamlit Cloud reads
          git add -f data/salidas/dashboard_noticias.csv
          git add -f data/salidas/resumen_llm_$(date -u +%Y-%m-%d).txt || true
          git diff --cached --quiet || git commit -m "chore: pipeline diario $(date -u +%Y-%m-%d)"
          git push
