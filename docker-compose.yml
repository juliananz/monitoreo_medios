services:

  pipeline:
    build: .
    volumes:
      - sqlite_data:/app/data
      - hf_cache:/root/.cache/huggingface
    command: python main.py
    # Run manually: docker compose run --rm pipeline
    profiles:
      - pipeline

  dashboard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - sqlite_data:/app/data
    command: >
      streamlit run app/app.py
      --server.port 8501
      --server.address 0.0.0.0

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DB_PATH=/app/data/noticias_medios.db

volumes:
  sqlite_data:
  hf_cache:
